name: email-triage-env
version: "1.0.0"
description: >
  Real-world professional email triage environment for AI agent training and evaluation.
  Agents must classify emails by label (urgent/normal/low/spam/archive), assign a priority
  (1–5), and optionally route to the correct team. Three tasks ranging from easy single-inbox
  triage to hard multi-account triage with routing rules. Partial reward shaping across
  the full trajectory provides dense learning signal.

author: hackathon-submission
tags:
  - openenv
  - email
  - triage
  - nlp
  - real-world
  - classification

tasks:
  - id: task1
    name: Single Inbox Triage
    difficulty: easy
    num_emails: 5
    max_steps: 10
    success_threshold: 0.7
    description: >
      Triage 5 professional emails. Clear signals distinguish urgent alerts,
      routine business, social, and spam. Tests basic classification.

  - id: task2
    name: Batch Inbox Triage Under Time Pressure
    difficulty: medium
    num_emails: 10
    max_steps: 15
    success_threshold: 0.7
    description: >
      Triage 10 emails from a busy executive inbox. Requires separating
      critical items (security breach, production bug, CEO prep) from noise.

  - id: task3
    name: Multi-Account Triage with Routing Rules
    difficulty: hard
    num_emails: 12
    max_steps: 20
    success_threshold: 0.7
    description: >
      Triage 12 enterprise emails. Must follow routing rules to assign to
      the correct team plus label and priority. High stakes items include
      a $2.4M deal, ransomware alert, NDA deadline, and payment outage.

action_space:
  type: structured
  fields:
    email_id:
      type: string
      description: ID of the email being triaged
    label:
      type: string
      enum: [urgent, normal, low, spam, archive]
    priority:
      type: integer
      min: 1
      max: 5
      description: 1=highest urgency, 5=lowest
    assign_to:
      type: string
      enum: [sales, security, engineering, hr, legal, general]
      required: false
      description: Team routing (required for task3)
    reply_draft:
      type: string
      required: false
      description: Optional reply draft text
    reasoning:
      type: string
      required: false
      description: Agent reasoning (logged only, not graded)

observation_space:
  type: structured
  fields:
    task_id: string
    step_number: integer
    emails: list[Email]
    processed_count: integer
    total_emails: integer
    current_email_index: integer
    inbox_labels: dict[string, string]
    rules_context: string|null
    done: boolean

reward:
  type: float
  range: [0.0, 1.0]
  components:
    label_correctness: 0.50
    priority_exact: 0.30
    priority_close: 0.15
    team_routing: 0.20  # task3 only
  penalties:
    critical_misclassification: -0.30
    false_alarm: -0.20
    inefficiency: -0.01 per step after halfway mark
  shaping: dense  # reward provided at every step

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  tasks: GET /tasks
  health: GET /health

runtime:
  framework: fastapi
  python: "3.11"
  port: 7860

inference:
  script: inference.py
  env_vars:
    - API_BASE_URL
    - MODEL_NAME
    - HF_TOKEN
  log_format: json
  log_events: [START, STEP, END]
  max_runtime_minutes: 20
